apiVersion: apps/v1
kind: Deployment

metadata:
  name: payment-service

spec:
  replicas: 2

  selector:
    matchLabels:
      app: payment-service

  template:
    metadata:
      labels:
        app: payment-service

    spec:
      containers:
      - name: payment-service
        image: 093435167670.dkr.ecr.ap-southeast-1.amazonaws.com/payment-service:IMAGE_TAG
        ports:
        - containerPort: 5000